<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" /> <meta name="theme-color" content="#0a0005" /> <title>Para Ana ♥</title> <meta name="description" content="Um pedacinho de eternidade, feito em código, para Ana." /> <link rel="preconnect" href="https://fonts.googleapis.com"> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500;1,600;1,700&family=Cormorant+Upright:wght@300;400&display=swap" rel="stylesheet"> <style> *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } :root { --bg-deep: #07000a; --bg-mid: #1a0413; --rose: #ff4f86; --rose-soft: #ffb3c7; --rose-deep: #c41e5f; --cream: #ffe7ee; --gold: #f6c879; } html, body { height: 100%; width: 100%; overflow: hidden; background: radial-gradient(ellipse at 50% 55%, #1a0413 0%, #0a0107 50%, #000 100%); font-family: 'Cormorant Garamond', 'Times New Roman', serif; color: var(--cream); -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; cursor: pointer; } body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, rgba(255, 79, 134, 0.12), transparent 40%), radial-gradient(circle at 80% 70%, rgba(246, 200, 121, 0.08), transparent 40%); pointer-events: none; z-index: 1; animation: drift 18s ease-in-out infinite alternate; } @keyframes drift { from { transform: translate(0, 0) scale(1); } to { transform: translate(-3%, 2%) scale(1.05); } } /* Soft grain overlay */ body::after { content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 4; opacity: 0.06; mix-blend-mode: overlay; background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.4) 0 1px, transparent 1px 3px), repeating-linear-gradient(90deg, rgba(255,255,255,0.4) 0 1px, transparent 1px 3px); } #scene { position: fixed; inset: 0; z-index: 2; display: block; } .overlay { position: fixed; inset: 0; z-index: 3; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 6vh 6vw; text-align: center; } /* === Top eyebrow === */ .top { opacity: 0; animation: rise 1.6s cubic-bezier(.2,.7,.2,1) 0.3s forwards; } .eyebrow { font-family: 'Cormorant Upright', serif; font-weight: 300; font-size: clamp(11px, 2.6vw, 15px); letter-spacing: 0.45em; text-transform: uppercase; color: rgba(255, 200, 215, 0.55); margin-bottom: 0.5em; } .eyebrow .dot { display: inline-block; width: 4px; height: 4px; background: var(--rose); border-radius: 50%; margin: 0 0.9em 3px; vertical-align: middle; box-shadow: 0 0 8px var(--rose); } .top-title { font-style: italic; font-weight: 400; font-size: clamp(28px, 7vw, 56px); line-height: 1; background: linear-gradient(180deg, #fff 0%, #ffd0dd 50%, #ff6f9c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 18px rgba(255, 100, 150, 0.35)); } .top-title em { font-style: italic; font-weight: 500; } /* === Bottom message === */ .bottom { opacity: 0; animation: rise 2s cubic-bezier(.2,.7,.2,1) 1.4s forwards; width: 100%; } .ornament { display: inline-flex; align-items: center; gap: 14px; margin-bottom: 1.1em; color: rgba(255, 180, 200, 0.6); font-size: 18px; } .ornament .line { display: inline-block; width: clamp(40px, 12vw, 80px); height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 180, 200, 0.7), transparent); } .message { font-style: italic; font-weight: 400; font-size: clamp(26px, 6.5vw, 52px); line-height: 1.15; color: var(--cream); text-shadow: 0 0 18px rgba(255, 100, 150, 0.55), 0 0 50px rgba(255, 60, 110, 0.25); letter-spacing: 0.005em; } .message .highlight { font-weight: 600; background: linear-gradient(180deg, #ffe7ee 0%, #ff8aae 60%, #c41e5f 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; position: relative; } .signature { margin-top: 1.4em; font-family: 'Cormorant Upright', serif; font-size: clamp(11px, 2.4vw, 14px); font-weight: 300; letter-spacing: 0.5em; text-transform: uppercase; color: rgba(255, 200, 215, 0.5); } .signature .heart { color: var(--rose); font-style: normal; margin: 0 0.4em; text-shadow: 0 0 10px var(--rose); } /* === Tap hint === */ .hint { position: fixed; bottom: 1.2vh; left: 50%; transform: translateX(-50%); z-index: 5; font-family: 'Cormorant Upright', serif; font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(255, 255, 255, 0.28); pointer-events: none; opacity: 0; animation: rise 1.4s ease 3s forwards, breathe 3.5s ease-in-out 4.4s infinite; } @keyframes rise { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } } .hint { animation-name: rise, breathe; } @keyframes breathe { 0%, 100% { opacity: 0.25; } 50% { opacity: 0.7; } } /* Mobile spacing tighten */ @media (max-width: 480px) { .overlay { padding: 4vh 5vw; } } /* No-script fallback */ .nojs { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: #000; color: #ffe7ee; font-style: italic; font-size: 22px; z-index: 10; padding: 30px; text-align: center; } noscript .nojs { display: flex; } </style> </head> <body> <canvas id="scene" aria-hidden="true"></canvas> <div class="overlay"> <header class="top"> <div class="eyebrow">para<span class="dot"></span>Ana</div> <h1 class="top-title">um <em>coração</em> infinito</h1> </header> <footer class="bottom"> <div class="ornament" aria-hidden="true"> <span class="line"></span><span>♥</span><span class="line"></span> </div> <p class="message"> <span class="highlight">você será</span><br> minha futura mulher </p> <div class="signature">eu <span class="heart">♥</span> você · para sempre</div> </footer> </div> <div class="hint">toque em qualquer lugar</div> <noscript><div class="nojs">esta página precisa de javascript ativado para você ver toda a magia 💗</div></noscript> <script type="importmap"> { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } } </script> <script type="module"> import * as THREE from 'three'; /* ========================================================= RENDERER ========================================================= */ const canvas = document.getElementById('scene'); const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, powerPreference: 'high-performance' }); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); renderer.setSize(window.innerWidth, window.innerHeight); const scene = new THREE.Scene(); const camera = new THREE.PerspectiveCamera( 55, window.innerWidth / window.innerHeight, 0.1, 200 ); camera.position.set(0, 0, 13); /* ========================================================= SOFT PARTICLE TEXTURE ========================================================= */ function makeSpriteTexture() { const c = document.createElement('canvas'); c.width = c.height = 128; const ctx = c.getContext('2d'); const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64); g.addColorStop(0, 'rgba(255,255,255,1)'); g.addColorStop(0.18, 'rgba(255,255,255,0.85)'); g.addColorStop(0.45, 'rgba(255,200,220,0.3)'); g.addColorStop(0.85, 'rgba(255,80,130,0.05)'); g.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128); const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; return tex; } const spriteTex = makeSpriteTexture(); /* ========================================================= COLOR PALETTE ========================================================= */ const palette = [ new THREE.Color('#ff2e63'), new THREE.Color('#ff5e8a'), new THREE.Color('#ff90b3'), new THREE.Color('#ffc8d9'), new THREE.Color('#ffffff'), new THREE.Color('#f6c879'), new THREE.Color('#ff8090'), ]; function pickColor() { return palette[Math.floor(Math.random() * palette.length)]; } /* ========================================================= HEART SHAPE — parametric points (3D filled volume) x = 16 sin³(t) y = 13 cos(t) - 5 cos(2t) - 2 cos(3t) - cos(4t) ========================================================= */ function heartXY(t) { const x = 16 * Math.pow(Math.sin(t), 3); const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t); return [x, y]; } const HEART_COUNT = 5200; const heartGeo = new THREE.BufferGeometry(); const hPos = new Float32Array(HEART_COUNT * 3); const hCol = new Float32Array(HEART_COUNT * 3); const hSize = new Float32Array(HEART_COUNT); const hPhase = new Float32Array(HEART_COUNT); const hHome = new Float32Array(HEART_COUNT * 3); // resting position const hScatter = new Float32Array(HEART_COUNT * 3); // burst direction const SCALE = 0.19; for (let i = 0; i < HEART_COUNT; i++) { const t = Math.random() * Math.PI * 2; // Distribution: 35% on outline (crisper), 65% inside const onCurve = Math.random() < 0.35; const r = onCurve ? 0.96 + Math.random() * 0.06 : Math.pow(Math.random(), 0.65); const [hx, hy] = heartXY(t); const px = hx * r * SCALE + (Math.random() - 0.5) * 0.06; const py = hy * r * SCALE + (Math.random() - 0.5) * 0.06; // Depth: heart is shaped like a flatter lobed volume const zMax = 1.6 * (0.3 + 0.7 * (1 - r)); const pz = (Math.random() - 0.5) * zMax; hPos[i*3] = px; hPos[i*3+1] = py; hPos[i*3+2] = pz; hHome[i*3] = px; hHome[i*3+1] = py; hHome[i*3+2] = pz; // outward direction (from center) for click bursts const dx = px, dy = py, dz = pz; const dlen = Math.hypot(dx, dy, dz) || 1; hScatter[i*3] = dx / dlen; hScatter[i*3+1] = dy / dlen; hScatter[i*3+2] = dz / dlen; const c = pickColor(); hCol[i*3] = c.r; hCol[i*3+1] = c.g; hCol[i*3+2] = c.b; hSize[i] = Math.random() * 0.12 + 0.05; hPhase[i] = Math.random() * Math.PI * 2; } heartGeo.setAttribute('position', new THREE.BufferAttribute(hPos, 3)); heartGeo.setAttribute('color', new THREE.BufferAttribute(hCol, 3)); const heartMat = new THREE.PointsMaterial({ size: 0.13, map: spriteTex, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true, }); const heart = new THREE.Points(heartGeo, heartMat); scene.add(heart); /* ========================================================= GLOWING CORE (rotating crystal heart) ========================================================= */ const coreGroup = new THREE.Group(); scene.add(coreGroup); const coreGeo = new THREE.IcosahedronGeometry(0.55, 1); const coreMat = new THREE.MeshBasicMaterial({ color: 0xff4878, transparent: true, opacity: 0.55, }); const core = new THREE.Mesh(coreGeo, coreMat); coreGroup.add(core); const coreWireGeo = new THREE.IcosahedronGeometry(0.7, 1); const coreWireMat = new THREE.MeshBasicMaterial({ color: 0xffaac4, transparent: true, opacity: 0.18, wireframe: true, }); const coreWire = new THREE.Mesh(coreWireGeo, coreWireMat); coreGroup.add(coreWire); const coreHaloGeo = new THREE.SphereGeometry(0.95, 24, 24); const coreHaloMat = new THREE.MeshBasicMaterial({ color: 0xff3366, transparent: true, opacity: 0.08, }); const coreHalo = new THREE.Mesh(coreHaloGeo, coreHaloMat); coreGroup.add(coreHalo); /* ========================================================= AMBIENT SPARKLES (floating around) ========================================================= */ const SPARKLE_COUNT = 1100; const sGeo = new THREE.BufferGeometry(); const sPos = new Float32Array(SPARKLE_COUNT * 3); const sCol = new Float32Array(SPARKLE_COUNT * 3); const sVel = []; for (let i = 0; i < SPARKLE_COUNT; i++) { const radius = 4 + Math.random() * 12; const theta = Math.random() * Math.PI * 2; const phi = Math.acos(2 * Math.random() - 1); sPos[i*3] = radius * Math.sin(phi) * Math.cos(theta); sPos[i*3+1] = radius * Math.sin(phi) * Math.sin(theta); sPos[i*3+2] = radius * Math.cos(phi) * 0.55; const c = pickColor(); sCol[i*3] = c.r; sCol[i*3+1] = c.g; sCol[i*3+2] = c.b; sVel.push({ x: (Math.random() - 0.5) * 0.006, y: (Math.random() - 0.5) * 0.005 + 0.0015, z: (Math.random() - 0.5) * 0.004, s: Math.random() * Math.PI * 2, }); } sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3)); sGeo.setAttribute('color', new THREE.BufferAttribute(sCol, 3)); const sMat = new THREE.PointsMaterial({ size: 0.09, map: spriteTex, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.85, }); const sparkles = new THREE.Points(sGeo, sMat); scene.add(sparkles); /* ========================================================= POINTER TRACKING ========================================================= */ const pointer = { tx: 0, ty: 0, x: 0, y: 0 }; function setPointer(clientX, clientY) { pointer.tx = (clientX / window.innerWidth - 0.5) * 0.6; pointer.ty = (clientY / window.innerHeight - 0.5) * 0.6; } window.addEventListener('mousemove', (e) => setPointer(e.clientX, e.clientY)); window.addEventListener('touchmove', (e) => { if (e.touches[0]) setPointer(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true }); /* ========================================================= CLICK BURST — extra little hearts of color ========================================================= */ const bursts = []; function makeBurst(clientX, clientY) { // map screen → world at z=0 const ndcX = (clientX / window.innerWidth) * 2 - 1; const ndcY = -(clientY / window.innerHeight) * 2 + 1; const v = new THREE.Vector3(ndcX, ndcY, 0.5).unproject(camera); const dir = v.sub(camera.position).normalize(); const dist = -camera.position.z / dir.z; const wp = camera.position.clone().add(dir.multiplyScalar(dist)); const N = 80; const pos = new Float32Array(N * 3); const col = new Float32Array(N * 3); const vel = []; for (let i = 0; i < N; i++) { pos[i*3] = wp.x; pos[i*3+1] = wp.y; pos[i*3+2] = wp.z; const c = pickColor(); col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b; const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 0.18 + 0.04; vel.push({ x: Math.cos(angle) * speed, y: Math.sin(angle) * speed + 0.04, z: (Math.random() - 0.5) * 0.08, }); } const g = new THREE.BufferGeometry(); g.setAttribute('position', new THREE.BufferAttribute(pos, 3)); g.setAttribute('color', new THREE.BufferAttribute(col, 3)); const m = new THREE.PointsMaterial({ size: 0.22, map: spriteTex, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 1, }); const pts = new THREE.Points(g, m); pts.userData = { life: 1, vel }; scene.add(pts); bursts.push(pts); // also pulse the heart slightly pulseHeart(); } let heartPulse = 0; function pulseHeart() { heartPulse = 1; } window.addEventListener('click', (e) => makeBurst(e.clientX, e.clientY)); window.addEventListener('touchstart', (e) => { if (e.touches[0]) makeBurst(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true }); /* ========================================================= ANIMATE ========================================================= */ const clock = new THREE.Clock(); const tmpV = new THREE.Vector3(); function animate() { const t = clock.getElapsedTime(); const dt = Math.min(clock.getDelta(), 0.05); // Smooth pointer pointer.x += (pointer.tx - pointer.x) * 0.05; pointer.y += (pointer.ty - pointer.y) * 0.05; // Heart rotation — slow, graceful, follows pointer subtly heart.rotation.y = t * 0.18 + pointer.x; heart.rotation.x = Math.sin(t * 0.25) * 0.08 - pointer.y * 0.4; // Pulsing scale (heartbeat) const beat = 1 + Math.sin(t * 2.2) * 0.035 + Math.sin(t * 4.5) * 0.012; const burstScale = 1 + heartPulse * 0.18; heart.scale.setScalar(beat * burstScale); heartPulse *= 0.92; // Per-particle shimmer (breathing in/out from home position) const arr = heartGeo.attributes.position.array; for (let i = 0; i < HEART_COUNT; i++) { const ph = hPhase[i]; const wave = Math.sin(t * 1.6 + ph) * 0.04; arr[i*3] = hHome[i*3] + hScatter[i*3] * wave; arr[i*3+1] = hHome[i*3+1] + hScatter[i*3+1] * wave; arr[i*3+2] = hHome[i*3+2] + hScatter[i*3+2] * wave; } heartGeo.attributes.position.needsUpdate = true; // Core coreGroup.rotation.y = t * 0.4; coreGroup.rotation.x = t * 0.25; coreWire.rotation.x = -t * 0.6; coreWire.rotation.y = -t * 0.5; const corePulse = 1 + Math.sin(t * 3) * 0.12; core.scale.setScalar(corePulse); coreHalo.scale.setScalar(1 + Math.sin(t * 1.5) * 0.08); // Sparkles drift const sArr = sGeo.attributes.position.array; for (let i = 0; i < SPARKLE_COUNT; i++) { const v = sVel[i]; sArr[i*3] += v.x; sArr[i*3+1] += v.y + Math.sin(t + v.s) * 0.0006; sArr[i*3+2] += v.z; // gentle bound box wrap if (sArr[i*3+1] > 11) sArr[i*3+1] = -11; if (sArr[i*3+1] < -11) sArr[i*3+1] = 11; if (Math.abs(sArr[i*3]) > 16) v.x *= -1; if (Math.abs(sArr[i*3+2]) > 11) v.z *= -1; } sGeo.attributes.position.needsUpdate = true; sparkles.rotation.y = t * 0.04; // Bursts update for (let i = bursts.length - 1; i >= 0; i--) { const b = bursts[i]; b.userData.life -= dt * 0.75; const pos = b.geometry.attributes.position.array; const vel = b.userData.vel; for (let j = 0; j < vel.length; j++) { pos[j*3] += vel[j].x; pos[j*3+1] += vel[j].y; pos[j*3+2] += vel[j].z; vel[j].y -= 0.0035; // gravity vel[j].x *= 0.985; } b.geometry.attributes.position.needsUpdate = true; b.material.opacity = Math.max(0, b.userData.life); if (b.userData.life <= 0) { scene.remove(b); b.geometry.dispose(); b.material.dispose(); bursts.splice(i, 1); } } renderer.render(scene, camera); requestAnimationFrame(animate); } animate(); /* ========================================================= RESIZE ========================================================= */ window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }); /* ========================================================= INITIAL ENTRANCE — first burst from center ========================================================= */ setTimeout(() => { makeBurst(window.innerWidth / 2, window.innerHeight / 2); }, 800); </script> </body> </html>
